<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <text x="400" y="35" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="18" text-anchor="middle">싱글톤(Singleton) 디자인 패턴 구조</text>

  <!-- Client -->
  <g transform="translate(60, 130)" filter="url(#shadow)">
    <rect width="160" height="140" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" />
    <rect width="160" height="30" rx="12" fill="#3b82f6" />
    <rect y="22" width="160" height="8" fill="#3b82f6" />
    <text x="80" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">클라이언트 코드</text>
    
    <text x="15" y="65" fill="#1e40af" font-family="monospace" font-size="10">// 직접 인스턴스화 차단</text>
    <text x="15" y="80" fill="#991b1b" font-family="monospace" font-size="10" font-weight="bold">new Config(); (오류)</text>
    <text x="15" y="105" fill="#1e40af" font-family="monospace" font-size="10">// 유일 인스턴스 호출</text>
    <text x="15" y="120" fill="#15803d" font-family="monospace" font-size="10" font-weight="bold">Config::getInstance();</text>
  </g>

  <!-- Singleton Class -->
  <g transform="translate(420, 90)" filter="url(#shadow)">
    <rect width="320" height="220" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <rect width="320" height="36" rx="12" fill="#4f46e5" />
    <rect y="28" width="320" height="8" fill="#4f46e5" />
    <text x="160" y="22" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="13" text-anchor="middle">class Config (Singleton)</text>
    
    <!-- Private Fields -->
    <text x="15" y="60" fill="#4f46e5" font-family="'Inter', sans-serif" font-weight="700" font-size="11">Private Static Properties</text>
    <text x="15" y="78" fill="#475569" font-family="monospace" font-size="11">- private static $instance = null;</text>
    <line x1="15" y1="90" x2="305" y2="90" stroke="#cbd5e1" stroke-width="1" />

    <!-- Private Constructor -->
    <text x="15" y="110" fill="#dc3545" font-family="'Inter', sans-serif" font-weight="700" font-size="11">Private Constructor (외부 new 방지)</text>
    <text x="15" y="128" fill="#475569" font-family="monospace" font-size="11">- private function __construct() { }</text>
    <line x1="15" y1="140" x2="305" y2="140" stroke="#cbd5e1" stroke-width="1" />

    <!-- Public Static Method -->
    <text x="15" y="160" fill="#0d9488" font-family="'Inter', sans-serif" font-weight="700" font-size="11">Public Static Getter</text>
    <text x="15" y="178" fill="#475569" font-family="monospace" font-size="11">+ public static function getInstance() {</text>
    <text x="30" y="196" fill="#475569" font-family="monospace" font-size="11">  // 존재하지 않을 시에만 단 한 번 생성</text>
    <text x="15" y="210" fill="#475569" font-family="monospace" font-size="11">}</text>
  </g>

  <!-- Connector -->
  <path d="M 220,200 L 410,200" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="315" y="188" fill="#64748b" font-family="'Inter', sans-serif" font-weight="700" font-size="10" text-anchor="middle">getInstance() 호출</text>
</svg>
