<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4f46e5" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <text x="400" y="35" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="18" text-anchor="middle">추상 클래스(Abstract Class)와 구현(Implementation) 구조</text>

  <!-- Abstract Shape Box -->
  <g transform="translate(300, 70)" filter="url(#shadow)">
    <rect width="200" height="110" rx="12" fill="#fcf6e8" stroke="#fef08a" stroke-width="1.5" />
    <rect width="200" height="32" rx="12" fill="#eab308" />
    <rect y="24" width="200" height="8" fill="#eab308" />
    <text x="100" y="21" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">추상 클래스 (미완성 설계도)</text>
    
    <text x="100" y="55" fill="#854d0e" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">abstract class Shape</text>
    <text x="20" y="78" fill="#854d0e" font-family="'Inter', sans-serif" font-size="10" font-style="italic">abstract public getArea()</text>
    <text x="20" y="94" fill="#a16207" font-family="'Inter', sans-serif" font-size="10">→ 시그니처만 정의, 바디 없음</text>
  </g>

  <!-- Concrete Circle Class Box -->
  <g transform="translate(150, 240)" filter="url(#shadow)">
    <rect width="220" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <rect width="220" height="32" rx="12" fill="#0d9488" />
    <rect y="24" width="220" height="8" fill="#0d9488" />
    <text x="110" y="21" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">구현 클래스 1 (실체)</text>
    
    <text x="110" y="55" fill="#0f172a" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">class Circle extends Shape</text>
    <text x="15" y="78" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10" font-weight="600">public getArea() {</text>
    <text x="30" y="96" fill="#0f172a" font-family="monospace" font-size="10">return pi() * $this->radius ** 2;</text>
    <text x="15" y="112" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10">}</text>
  </g>

  <!-- Concrete Rectangle Class Box -->
  <g transform="translate(430, 240)" filter="url(#shadow)">
    <rect width="220" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <rect width="220" height="32" rx="12" fill="#0d9488" />
    <rect y="24" width="220" height="8" fill="#0d9488" />
    <text x="110" y="21" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">구현 클래스 2 (실체)</text>
    
    <text x="110" y="55" fill="#0f172a" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">class Rectangle extends Shape</text>
    <text x="15" y="78" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10" font-weight="600">public getArea() {</text>
    <text x="30" y="96" fill="#0f172a" font-family="monospace" font-size="10">return $this->w * $this->h;</text>
    <text x="15" y="112" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10">}</text>
  </g>

  <!-- Inheritance/Implementation arrows -->
  <path d="M 260,240 L 350,190" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)" />
  <path d="M 540,240 L 450,190" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)" />
</svg>
