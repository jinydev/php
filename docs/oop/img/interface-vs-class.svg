<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4f46e5" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <text x="400" y="35" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="18" text-anchor="middle">인터페이스(Interface)와 다중 구현(Multiple Implementation)</text>

  <!-- Interface 1 -->
  <g transform="translate(120, 80)" filter="url(#shadow)">
    <rect width="220" height="110" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" />
    <rect width="220" height="30" rx="12" fill="#166534" />
    <rect y="22" width="220" height="8" fill="#166534" />
    <text x="110" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">&lt;&lt;interface&gt;&gt; Flyable</text>
    <text x="20" y="65" fill="#166534" font-family="monospace" font-size="11" font-weight="bold">public function fly();</text>
    <text x="20" y="85" fill="#64748b" font-family="'Inter', sans-serif" font-size="10">(구현 강제 규약 1)</text>
  </g>

  <!-- Interface 2 -->
  <g transform="translate(460, 80)" filter="url(#shadow)">
    <rect width="220" height="110" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" />
    <rect width="220" height="30" rx="12" fill="#166534" />
    <rect y="22" width="220" height="8" fill="#166534" />
    <text x="110" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">&lt;&lt;interface&gt;&gt; Soundable</text>
    <text x="20" y="65" fill="#166534" font-family="monospace" font-size="11" font-weight="bold">public function makeSound();</text>
    <text x="20" y="85" fill="#64748b" font-family="'Inter', sans-serif" font-size="10">(구현 강제 규약 2)</text>
  </g>

  <!-- Class implementing both -->
  <g transform="translate(260, 240)" filter="url(#shadow)">
    <rect width="280" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
    <rect width="280" height="32" rx="12" fill="#0d9488" />
    <rect y="24" width="280" height="8" fill="#0d9488" />
    <text x="140" y="21" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">클래스 다중 구현 (Multiple Implements)</text>
    
    <text x="140" y="55" fill="#0f172a" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">class Bird implements Flyable, Soundable</text>
    <text x="20" y="78" fill="#0d9488" font-family="monospace" font-size="11" font-weight="bold">public function fly() { ... }</text>
    <text x="20" y="96" fill="#0d9488" font-family="monospace" font-size="11" font-weight="bold">public function makeSound() { ... }</text>
  </g>

  <!-- Arrows from bird to interfaces -->
  <path d="M 330,240 L 260,192" fill="none" stroke="#166534" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)" />
  <path d="M 470,240 L 540,192" fill="none" stroke="#166534" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)" />
</svg>
