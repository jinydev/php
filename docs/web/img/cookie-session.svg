<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4f46e5" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <text x="400" y="35" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="18" text-anchor="middle">세션(Session) 인증 및 쿠키(Cookie) 통신 흐름</text>

  <!-- Left: Client (Browser) -->
  <g transform="translate(60, 80)" filter="url(#shadow)">
    <rect width="200" height="280" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <rect width="200" height="50" rx="16" fill="#eff6ff" />
    <rect y="40" width="200" height="10" fill="#eff6ff" />
    <text x="100" y="32" fill="#1e40af" font-family="'Inter', sans-serif" font-weight="800" font-size="14" text-anchor="middle">웹 브라우저 (Client)</text>
    
    <!-- Cookie box -->
    <rect x="20" y="180" width="160" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="30" y="200" fill="#475569" font-family="'Inter', sans-serif" font-weight="700" font-size="11">브라우저 쿠키 저장소</text>
    <rect x="30" y="210" width="140" height="30" rx="4" fill="#fee2e2" stroke="#fecaca" />
    <text x="100" y="228" fill="#991b1b" font-family="monospace" font-size="10" text-anchor="middle">PHPSESSID = abcd1234</text>
  </g>

  <!-- Right: Server (PHP Engine) -->
  <g transform="translate(540, 80)" filter="url(#shadow)">
    <rect width="200" height="280" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <rect width="200" height="50" rx="16" fill="#f5f3ff" />
    <rect y="40" width="200" height="10" fill="#f5f3ff" />
    <text x="100" y="32" fill="#5b21b6" font-family="'Inter', sans-serif" font-weight="800" font-size="14" text-anchor="middle">웹 서버 &amp; PHP Engine</text>

    <!-- Session storage -->
    <rect x="20" y="160" width="160" height="90" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="100" y="180" fill="#475569" font-family="'Inter', sans-serif" font-weight="700" font-size="11" text-anchor="middle">서버 세션 메모리</text>
    <rect x="30" y="192" width="140" height="48" rx="4" fill="#faf5ff" stroke="#e9d5ff" />
    <text x="40" y="208" fill="#6b21a8" font-family="monospace" font-size="9">ID: abcd1234</text>
    <text x="40" y="222" fill="#6b21a8" font-family="monospace" font-size="9">Data: [user_id => 12]</text>
  </g>

  <!-- Intermediary Flows (Arrows) -->
  <!-- Step 1: Login -->
  <path d="M 260,110 L 530,110" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="395" y="100" fill="#2563eb" font-family="'Inter', sans-serif" font-weight="700" font-size="11" text-anchor="middle">1. 로그인 요청 (POST ID/PW)</text>

  <!-- Step 2: Set-Cookie -->
  <path d="M 540,150 L 272,150" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow)" />
  <text x="395" y="140" fill="#059669" font-family="'Inter', sans-serif" font-weight="700" font-size="11" text-anchor="middle">2. 세션 ID 생성 및 Set-Cookie 응답</text>
  <text x="395" y="165" fill="#059669" font-family="monospace" font-size="9" text-anchor="middle">Set-Cookie: PHPSESSID=abcd1234</text>

  <!-- Step 3: Next Request with Cookie -->
  <path d="M 260,280 L 530,280" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-indigo)" />
  <text x="395" y="272" fill="#4f46e5" font-family="'Inter', sans-serif" font-weight="700" font-size="11" text-anchor="middle">3. 이후 모든 요청 시 쿠키 자동 동반</text>
  <text x="395" y="295" fill="#4f46e5" font-family="monospace" font-size="9" text-anchor="middle">Cookie: PHPSESSID=abcd1234</text>

  <!-- Step 4: Verification -->
  <path d="M 540,320 L 272,320" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow)" />
  <text x="395" y="313" fill="#059669" font-family="'Inter', sans-serif" font-weight="700" font-size="11" text-anchor="middle">4. 세션 ID 매칭 후 회원 전용 데이터 응답</text>
</svg>
