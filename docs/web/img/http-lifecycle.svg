<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <!-- Client Component -->
  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="160" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <rect width="160" height="40" rx="12" fill="#eff6ff" />
    <rect y="30" width="160" height="10" fill="#eff6ff" />
    <text x="80" y="25" fill="#1e3a8a" font-family="'Inter', sans-serif" font-weight="800" font-size="14" text-anchor="middle">클라이언트 (브라우저)</text>
    <circle cx="25" cy="85" r="5" fill="#3b82f6" />
    <text x="40" y="89" fill="#475569" font-family="'Inter', sans-serif" font-weight="600" font-size="12">1. URL 주소창 입력</text>
    <circle cx="25" cy="125" r="5" fill="#3b82f6" />
    <text x="40" y="129" fill="#475569" font-family="'Inter', sans-serif" font-weight="600" font-size="12">2. HTTP 요청 전송</text>
    <circle cx="25" cy="165" r="5" fill="#10b981" />
    <text x="40" y="169" fill="#475569" font-family="'Inter', sans-serif" font-weight="600" font-size="12">5. 화면 HTML 해석</text>
  </g>

  <!-- Server Component -->
  <g transform="translate(600, 110)" filter="url(#shadow)">
    <rect width="160" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <rect width="160" height="40" rx="12" fill="#f0fdf4" />
    <rect y="30" width="160" height="10" fill="#f0fdf4" />
    <text x="80" y="25" fill="#065f46" font-family="'Inter', sans-serif" font-weight="800" font-size="14" text-anchor="middle">서버 (WAS)</text>
    <circle cx="25" cy="85" r="5" fill="#3b82f6" />
    <text x="40" y="89" fill="#475569" font-family="'Inter', sans-serif" font-weight="600" font-size="12">3. 패킷 데이터 파싱</text>
    <circle cx="25" cy="125" r="5" fill="#3b82f6" />
    <text x="40" y="129" fill="#475569" font-family="'Inter', sans-serif" font-weight="600" font-size="12">4. PHP 스크립트 실행</text>
    <circle cx="25" cy="165" r="5" fill="#10b981" />
    <text x="40" y="169" fill="#475569" font-family="'Inter', sans-serif" font-weight="600" font-size="12">4. HTTP 응답 생성</text>
  </g>

  <!-- Top Path: HTTP Request Packet -->
  <g transform="translate(230, 40)" filter="url(#shadow)">
    <rect width="340" height="120" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5" />
    <rect width="340" height="28" rx="8" fill="url(#blue-grad)" />
    <rect y="20" width="340" height="8" fill="url(#blue-grad)" />
    <text x="15" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12">HTTP Request (요청 패킷)</text>
    
    <text x="15" y="48" fill="#1e293b" font-family="monospace" font-size="11" font-weight="bold">GET /web/http.html HTTP/1.1</text>
    <text x="15" y="68" fill="#64748b" font-family="monospace" font-size="10">Host: php.jiny.dev</text>
    <text x="15" y="84" fill="#64748b" font-family="monospace" font-size="10">User-Agent: Mozilla/5.0 (Macintosh; ...)</text>
    <text x="15" y="100" fill="#64748b" font-family="monospace" font-size="10">Accept: text/html,application/xhtml+xml</text>
  </g>

  <!-- Bottom Path: HTTP Response Packet -->
  <g transform="translate(230, 240)" filter="url(#shadow)">
    <rect width="340" height="120" rx="8" fill="#f8fafc" stroke="#10b981" stroke-width="1.5" />
    <rect width="340" height="28" rx="8" fill="url(#emerald-grad)" />
    <rect y="20" width="340" height="8" fill="url(#emerald-grad)" />
    <text x="15" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="12">HTTP Response (응답 패킷)</text>
    
    <text x="15" y="48" fill="#1e293b" font-family="monospace" font-size="11" font-weight="bold">HTTP/1.1 200 OK</text>
    <text x="15" y="68" fill="#64748b" font-family="monospace" font-size="10">Content-Type: text/html; charset=UTF-8</text>
    <text x="15" y="84" fill="#64748b" font-family="monospace" font-size="10">Server: Apache/2.4.41 (Ubuntu)</text>
    <text x="15" y="105" fill="#059669" font-family="monospace" font-size="10" font-weight="bold">&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;body&gt;...&lt;/body&gt;&lt;/html&gt;</text>
  </g>

  <!-- Connective Arrows -->
  <path d="M 205,160 Q 215,90 225,90" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 572,90 Q 582,90 592,160" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M 595,240 Q 585,310 575,310" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 225,310 Q 215,310 205,240" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
</svg>
