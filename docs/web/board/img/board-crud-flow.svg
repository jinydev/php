<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <text x="400" y="35" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="18" text-anchor="middle">PHP 게시판(Board) CRUD 전체 아키텍처 및 데이터 흐름</text>

  <!-- 1. List (index.php) -->
  <g transform="translate(40, 150)" filter="url(#shadow)">
    <rect width="140" height="100" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" />
    <text x="70" y="45" fill="#1e40af" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">글 목록 페이지</text>
    <text x="70" y="65" fill="#1e40af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">index.php</text>
    <text x="70" y="82" fill="#475569" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">READ (다건)</text>
  </g>

  <!-- 2. Write Form (create.php) & Action (store.php) -->
  <g transform="translate(290, 70)" filter="url(#shadow)">
    <rect width="200" height="120" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2" />
    <text x="100" y="30" fill="#166534" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">글 쓰기</text>
    <text x="100" y="52" fill="#15803d" font-family="monospace" font-size="10" text-anchor="middle">create.php (입력폼 UI)</text>
    <line x1="20" y1="65" x2="180" y2="65" stroke="#bbf7d0" stroke-width="1.5" />
    <text x="100" y="82" fill="#15803d" font-family="monospace" font-size="10" text-anchor="middle">store.php (DB 저장 처리)</text>
    <text x="100" y="100" fill="#475569" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">CREATE (글 생성)</text>
  </g>

  <!-- 3. Detail Show (show.php) & Delete (delete.php) -->
  <g transform="translate(560, 150)" filter="url(#shadow)">
    <rect width="200" height="120" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" />
    <text x="100" y="30" fill="#c2410c" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">글 상세 보기 &amp; 삭제</text>
    <text x="100" y="52" fill="#c2410c" font-family="monospace" font-size="10" text-anchor="middle">show.php (상세 &amp; XSS방어)</text>
    <line x1="20" y1="65" x2="180" y2="65" stroke="#fed7aa" stroke-width="1.5" />
    <text x="100" y="82" fill="#c2410c" font-family="monospace" font-size="10" text-anchor="middle">delete.php (DB 삭제 처리)</text>
    <text x="100" y="100" fill="#475569" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">READ DETAIL / DELETE</text>
  </g>

  <!-- 4. Edit Form (edit.php) & Action (update.php) -->
  <g transform="translate(290, 260)" filter="url(#shadow)">
    <rect width="200" height="120" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2" />
    <text x="100" y="30" fill="#6d28d9" font-family="'Inter', sans-serif" font-weight="800" font-size="12" text-anchor="middle">글 수정</text>
    <text x="100" y="52" fill="#7c3aed" font-family="monospace" font-size="10" text-anchor="middle">edit.php (기존값 세팅폼)</text>
    <line x1="20" y1="65" x2="180" y2="65" stroke="#ddd6fe" stroke-width="1.5" />
    <text x="100" y="82" fill="#7c3aed" font-family="monospace" font-size="10" text-anchor="middle">update.php (DB 수정 처리)</text>
    <text x="100" y="100" fill="#475569" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">UPDATE (글 수정)</text>
  </g>

  <!-- Connections -->
  <!-- 1. index.php to create.php (Write Link) -->
  <path d="M 110,150 Q 180,100 280,100" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="180" y="112" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">글쓰기 버튼 클릭</text>

  <!-- 2. store.php to index.php (Redirect after save) -->
  <path d="M 290,140 Q 210,150 190,165" fill="none" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="210" y="180" fill="#166534" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">저장 후 리다이렉트</text>

  <!-- 3. index.php to show.php (Detail Link) -->
  <path d="M 180,200 L 550,200" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  <text x="360" y="192" fill="#2563eb" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">제목 클릭 (show.php?id=5)</text>

  <!-- 4. show.php to edit.php (Edit Link) -->
  <path d="M 620,270 Q 560,330 500,330" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="590" y="325" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">수정하기 클릭</text>

  <!-- 5. update.php to show.php (Redirect after edit) -->
  <path d="M 490,290 Q 550,280 570,270" fill="none" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="540" y="300" fill="#6d28d9" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">수정완료 후 리다이렉트</text>

  <!-- 6. delete.php to index.php (Redirect after delete) -->
  <path d="M 660,150 Q 400,20 180,150" fill="none" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="410" y="55" fill="#c2410c" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">삭제완료 후 리다이렉트</text>
</svg>
