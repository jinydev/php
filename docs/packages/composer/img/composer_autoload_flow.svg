<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="400" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="420" y="40" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">Composer Class Autoloading 작동 프로세스</text>

  <!-- Flowchart nodes -->
  <!-- Step 1 -->
  <g transform="translate(40, 90)" filter="url(#shadow)">
    <rect width="180" height="90" rx="8" fill="url(#nodeGrad1)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="90" y="30" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">1. 클래스 인스턴스화</text>
    <rect x="15" y="45" width="150" height="30" rx="4" fill="#0f172a" opacity="0.6"/>
    <text x="90" y="64" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#38bdf8" text-anchor="middle">new \App\User();</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(300, 90)" filter="url(#shadow)">
    <rect width="240" height="90" rx="8" fill="url(#nodeGrad2)" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="120" y="30" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">2. spl_autoload_register 작동</text>
    <text x="120" y="55" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">PHP 엔진이 미로드 클래스 감지,</text>
    <text x="120" y="70" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">Composer의 오토로드 콜백 함수 트리거</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(620, 90)" filter="url(#shadow)">
    <rect width="180" height="90" rx="8" fill="url(#nodeGrad2)" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="90" y="30" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">3. 매핑 데이터 스캔</text>
    <text x="90" y="55" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">autoload_psr4.php 및</text>
    <text x="90" y="70" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">classmap에서 실제 파일 검색</text>
  </g>

  <!-- Step 4 (Bottom Right) -->
  <g transform="translate(620, 260)" filter="url(#shadow)">
    <rect width="180" height="90" rx="8" fill="url(#nodeGrad3)" stroke="#059669" stroke-width="1.5"/>
    <text x="90" y="30" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">4. 파일 동적 include</text>
    <rect x="15" y="45" width="150" height="30" rx="4" fill="#0f172a" opacity="0.6"/>
    <text x="90" y="64" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#a7f3d0" text-anchor="middle">require_once $file;</text>
  </g>

  <!-- Step 5 (Bottom Left) -->
  <g transform="translate(300, 260)" filter="url(#shadow)">
    <rect width="240" height="90" rx="8" fill="url(#nodeGrad3)" stroke="#059669" stroke-width="1.5"/>
    <text x="120" y="30" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">5. 객체 메모리 적재 완료</text>
    <text x="120" y="55" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">해당 클래스가 정상 인스턴스화되어</text>
    <text x="120" y="70" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">사용자 런타임 코드로 넘어감</text>
  </g>

  <!-- Connections -->
  <path d="M 220,135 L 290,135" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 540,135 L 610,135" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 710,180 L 710,250" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 620,305 L 550,305" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Loop back link text indicating normal flow -->
  <path d="M 300,305 L 130,305 L 130,190" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="215" y="325" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">최초 1회 로드 후에는 오토로더를 타지 않고 즉시 호출</text>
</svg>
