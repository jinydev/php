<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; fill: #1e293b; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #64748b; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #475569; text-anchor: middle; }
    .label-bold { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1e293b; text-anchor: middle; }
    
    .box-col1 { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 12px; }
    .box-col2 { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 12px; }
    .box-col3 { fill: #faf5ff; stroke: #a855f7; stroke-width: 2; rx: 12px; }
    
    .badge { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 6px; }
    .line { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 3 3; fill: none; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="780" height="400" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <!-- Title Section -->
  <text x="35" y="50" class="title">PHP 핵심 특징 및 작동 매커니즘 개요</text>
  <text x="35" y="70" class="subtitle">웹 백엔드 핵심 언어로서 PHP가 제공하는 3가지 대표 아키텍처 기술 사양</text>

  <!-- 1. Server-Side Section -->
  <rect x="35" y="100" width="220" height="280" class="box-col1" />
  <text x="145" y="135" class="heading" fill="#1d4ed8">1. 서버 사이드 스크립트</text>
  
  <rect x="55" y="160" width="180" height="40" class="badge" />
  <text x="145" y="184" class="label-bold" fill="#2563eb">클라이언트-서버 구조</text>
  
  <rect x="55" y="215" width="180" height="60" class="badge" />
  <text x="145" y="238" class="label">서버에서 실행된 결과만</text>
  <text x="145" y="254" class="label">동적 HTML로 브라우저에 응답</text>
  
  <rect x="55" y="290" width="180" height="65" class="badge" />
  <text x="145" y="312" class="label" font-size="12">웹 서버(Nginx, Apache) 및</text>
  <text x="145" y="328" class="label" font-size="12">WAS(PHP-FPM) 유기적 결합</text>

  <!-- 2. Interpreter Section -->
  <rect x="290" y="100" width="220" height="280" class="box-col2" />
  <text x="400" y="135" class="heading" fill="#b45309">2. 인터프리터 런타임</text>

  <rect x="310" y="160" width="180" height="40" class="badge" />
  <text x="400" y="184" class="label-bold" fill="#d97706">Zend Engine 탑재</text>
  
  <rect x="310" y="215" width="180" height="60" class="badge" />
  <text x="400" y="238" class="label">별도의 컴파일 단계 없이</text>
  <text x="400" y="254" class="label">코드 수정을 실시간 즉각 반영</text>
  
  <rect x="310" y="290" width="180" height="65" class="badge" />
  <text x="400" y="312" class="label" font-size="12">구문 오류 실시간 추적 및</text>
  <text x="400" y="328" class="label" font-size="12">유연한 메모리 관리 구조</text>

  <!-- 3. Modern & Performance Section -->
  <rect x="545" y="100" width="220" height="280" class="box-col3" />
  <text x="655" y="135" class="heading" fill="#701a75">3. 모던 사양 &amp; 고속 가속</text>

  <rect x="565" y="160" width="180" height="40" class="badge" />
  <text x="655" y="184" class="label-bold" fill="#9333ea">OpCache &amp; JIT 이식</text>
  
  <rect x="565" y="215" width="180" height="60" class="badge" />
  <text x="655" y="238" class="label">PHP 7/8 메이저 고속 진화</text>
  <text x="655" y="254" class="label">Zend VM 바이트코드 기계어 번역</text>
  
  <rect x="565" y="290" width="180" height="65" class="badge" />
  <text x="655" y="312" class="label" font-size="12">엄격한 정적 타입 선언 및</text>
  <text x="655" y="328" class="label" font-size="12">Match 등 현대적 문법 확장</text>

  <!-- Inter-column arrows -->
  <path d="M 255 240 L 290 240" class="line" />
  <path d="M 510 240 L 545 240" class="line" />
</svg>
