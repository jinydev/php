<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="auto">
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12px; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #334155; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #475569; }
    .label-bold { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: #0f172a; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 600; fill: #1e293b; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
    
    .box-container { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8px; }
    .box-single { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8px; }
    .box-multi { fill: #faf5ff; stroke: #a855f7; stroke-width: 2; rx: 8px; }
    
    .line-flow-blue { stroke: #3b82f6; stroke-width: 2; fill: none; }
    .line-flow-purple { stroke: #a855f7; stroke-width: 2; fill: none; }
    .line-seq { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#a855f7" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" class="bg" rx="16" />
  <rect x="10" y="10" width="780" height="460" class="card" />

  <!-- Title -->
  <text x="30" y="45" class="title">함수의 반환 메커니즘 (Single vs Multiple Return Values)</text>

  <!-- Left Side: Single Value Return -->
  <rect x="40" y="80" width="340" height="360" class="box-container" />
  <text x="210" y="110" class="subtitle" fill="#1d4ed8" text-anchor="middle">1. 단일 값 반환 (Single Value Return)</text>
  <text x="210" y="130" class="label" fill="#475569" text-anchor="middle">가장 기본적인 1:1 값 반환 형태</text>

  <!-- Function definition (Left) -->
  <rect x="60" y="160" width="300" height="110" class="box-single" />
  <text x="75" y="185" class="code" fill="#1e40af">function sum($x, $y) {</text>
  <text x="95" y="210" class="code" fill="#1e40af">$z = $x + $y;</text>
  <text x="95" y="235" class="code" fill="#2563eb">return $z; <tspan fill="#1e3a8a" font-size="10">◀ 하나의 값 반환</tspan></text>
  <text x="75" y="255" class="code" fill="#1e40af">}</text>

  <!-- Caller receive (Left) -->
  <rect x="60" y="320" width="300" height="80" fill="#f8fafc" stroke="#cbd5e1" rx="6" />
  <text x="75" y="345" class="code" fill="#0f172a">$result = sum(10, 20);</text>
  <text x="75" y="370" class="label" fill="#2563eb">◀ $result 변수에 정수 30이 할당됨</text>

  <!-- Flow Line (Left) -->
  <path d="M 210 270 L 210 310" class="line-flow-blue" marker-end="url(#arrow-blue)" />


  <!-- Right Side: Multiple Values Return -->
  <rect x="420" y="80" width="340" height="360" class="box-container" />
  <text x="590" y="110" class="subtitle" fill="#6b21a8" text-anchor="middle">2. 복수 데이터 반환 (Multiple Values Return)</text>
  <text x="590" y="130" class="label" fill="#475569" text-anchor="middle">배열 패킹 및 호출처 구조분해 할당</text>

  <!-- Function definition (Right) -->
  <rect x="440" y="160" width="300" height="110" class="box-multi" />
  <text x="455" y="185" class="code" fill="#6b21a8">function getUser() {</text>
  <text x="475" y="210" class="code" fill="#7e22ce">$name = 'jiny';</text>
  <text x="475" y="235" class="code" fill="#a855f7">return [$name, 27]; <tspan fill="#581c87" font-size="10">◀ 배열로 패킹</tspan></text>
  <text x="455" y="255" class="code" fill="#6b21a8">}</text>

  <!-- Caller receive & Destructure (Right) -->
  <rect x="440" y="320" width="300" height="90" fill="#fcfaff" stroke="#cbd5e1" rx="6" />
  <text x="455" y="345" class="code" fill="#0f172a">[$uName, $uAge] = getUser();</text>
  <text x="455" y="370" class="label" fill="#7e22ce">◀ 리스트 구조분해 할당 (Destructuring)</text>
  <text x="455" y="390" class="label" fill="#475569" font-size="11">결과: $uName = 'jiny', $uAge = 27 대입 완료</text>

  <!-- Flow Line (Right) -->
  <path d="M 590 270 L 590 310" class="line-flow-purple" marker-end="url(#arrow-purple)" />
</svg>
