<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="auto">
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12px; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #334155; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #475569; }
    .label-bold { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: #0f172a; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 600; fill: #1e293b; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
    
    .box-blackbox { fill: #1e293b; stroke: #475569; stroke-width: 2.5; rx: 10px; }
    .box-io { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8px; }
    .box-output { fill: #f0fdf4; stroke: #10b981; stroke-width: 2; rx: 8px; }
    
    .line-flow-blue { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .line-flow-green { stroke: #10b981; stroke-width: 2.5; fill: none; }
    .line-dash { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4 2; fill: none; }
  </style>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.1" />
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff" />
    </marker>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" class="bg" rx="16" />
  <rect x="10" y="10" width="780" height="460" class="card" />

  <!-- Title -->
  <text x="30" y="45" class="title">함수의 핵심 구성 요소 (Key Components of a Function)</text>

  <!-- Left Box: Inputs (Arguments) -->
  <rect x="40" y="140" width="180" height="200" class="box-io" filter="url(#shadow)" />
  <text x="130" y="175" class="subtitle" fill="#1d4ed8" text-anchor="middle">입력 인자 (Input)</text>
  <text x="130" y="195" class="label" fill="#475569" text-anchor="middle">Arguments / Parameters</text>
  <rect x="55" y="220" width="150" height="90" fill="#ffffff" stroke="#cbd5e1" rx="4" />
  <text x="75" y="250" class="code" fill="#2563eb">$param1 = 10;</text>
  <text x="75" y="278" class="code" fill="#2563eb">$param2 = 20;</text>

  <!-- Central Black Box: Process -->
  <rect x="290" y="100" width="220" height="280" class="box-blackbox" filter="url(#shadow)" />
  <text x="400" y="140" class="subtitle" fill="#f8fafc" text-anchor="middle">함수 본체 (Black Box)</text>
  <text x="400" y="160" class="label" fill="#94a3b8" text-anchor="middle">Function Body / Local Scope</text>
  
  <rect x="305" y="180" width="190" height="180" fill="#0f172a" stroke="#334155" rx="6" />
  <text x="320" y="215" class="code" fill="#f472b6">function add(</text>
  <text x="340" y="240" class="code" fill="#38bdf8">$a, $b</text>
  <text x="320" y="265" class="code" fill="#f472b6">) {</text>
  <text x="340" y="295" class="code" fill="#e2e8f0">$sum = $a + $b;</text>
  <text x="340" y="325" class="code" fill="#34d399">return $sum;</text>
  <text x="320" y="345" class="code" fill="#f472b6">}</text>

  <!-- Right Box: Output (Return Value) -->
  <rect x="580" y="140" width="180" height="200" class="box-output" filter="url(#shadow)" />
  <text x="670" y="175" class="subtitle" fill="#047857" text-anchor="middle">결과 반환 (Output)</text>
  <text x="670" y="195" class="label" fill="#475569" text-anchor="middle">Return Value</text>
  <rect x="595" y="220" width="150" height="90" fill="#ffffff" stroke="#cbd5e1" rx="4" />
  <text x="670" y="260" class="subtitle" fill="#059669" text-anchor="middle">반환 데이터</text>
  <text x="670" y="285" class="code" font-size="14" fill="#047857" text-anchor="middle">30</text>

  <!-- Connection Lines -->
  <!-- Left to Center (Push parameters) -->
  <path d="M 220 240 L 280 240" class="line-flow-blue" marker-end="url(#arrow-blue)" />
  <text x="250" y="225" class="arrow-text" fill="#2563eb">전달 (Pass)</text>

  <!-- Center to Right (Return result) -->
  <path d="M 510 240 L 570 240" class="line-flow-green" marker-end="url(#arrow-green)" />
  <text x="540" y="225" class="arrow-text" fill="#047857">반환 (Return)</text>

  <!-- Bottom Instruction Box -->
  <rect x="40" y="400" width="720" height="45" fill="#f1f5f9" stroke="#cbd5e1" rx="6" />
  <text x="400" y="427" class="label" font-size="12" fill="#334155" text-anchor="middle">
    💡 <tspan font-weight="700">핵심:</tspan> 함수는 외부의 실행 환경과 완벽히 격리된 <tspan font-weight="600" fill="#1e40af">지역 유효범위(Local Scope)</tspan>를 가지며, 지정된 입출력 포트를 통해서만 소통합니다.
  </text>
</svg>
