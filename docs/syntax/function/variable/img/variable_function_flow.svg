<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="auto">
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12px; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #334155; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #475569; }
    .label-bold { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: #0f172a; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 600; fill: #1e293b; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
    
    .box-container { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8px; }
    .box-highlight { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8px; }
    .box-table { fill: #fdf2f8; stroke: #db2777; stroke-width: 1.5; rx: 6px; }
    
    .line-flow-blue { stroke: #3b82f6; stroke-width: 2; fill: none; }
    .line-flow-pink { stroke: #db2777; stroke-width: 2; fill: none; }
    .line-seq { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#db2777" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" class="bg" rx="16" />
  <rect x="10" y="10" width="780" height="460" class="card" />

  <!-- Title -->
  <text x="30" y="45" class="title">가변 함수의 동적 함수 해석 흐름 (Variable Function Dynamic Matching)</text>

  <!-- Left Column: Variable and Call -->
  <rect x="40" y="80" width="340" height="360" class="box-container" />
  <text x="210" y="110" class="subtitle" fill="#1d4ed8" text-anchor="middle">1단계: 가변값 정의 및 호출</text>

  <!-- Step 1: Assign String -->
  <g transform="translate(60, 150)">
    <rect width="300" height="70" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="6" />
    <text x="15" y="25" class="code" fill="#047857">$func = "hello";</text>
    <text x="15" y="50" class="label" fill="#065f46">◀ 변수에 호출할 함수명 문자열을 대입</text>
  </g>

  <!-- Step 2: Dynamic Call -->
  <g transform="translate(60, 290)">
    <rect width="300" height="70" class="box-highlight" />
    <text x="15" y="30" class="code" fill="#1d4ed8">$func();</text>
    <text x="15" y="52" class="label" fill="#1e40af">◀ $func 변수 내부의 문자열을 토대로 실행</text>
  </g>

  <path d="M 210 220 L 210 280" class="line-flow-blue" marker-end="url(#arrow-blue)" />
  <text x="235" y="255" class="arrow-text" fill="#2563eb">평가(Eval)</text>

  <!-- Right Column: Symbol Table Lookup -->
  <rect x="420" y="80" width="340" height="360" class="box-container" />
  <text x="590" y="110" class="subtitle" fill="#db2777" text-anchor="middle">2단계: 런타임 매칭 및 실행</text>

  <!-- Symbol Table -->
  <g transform="translate(440, 140)">
    <rect width="300" height="120" class="box-table" />
    <text x="150" y="25" class="subtitle" font-size="12" fill="#9d174d" text-anchor="middle">PHP 내장/사용자 함수 테이블</text>
    
    <!-- Table Rows -->
    <rect x="20" y="40" width="260" height="22" fill="#ffffff" stroke="#fbcfe8" rx="3" />
    <text x="35" y="55" class="code" font-size="11">test()</text>

    <!-- Highlighted row -->
    <rect x="20" y="66" width="260" height="22" fill="#fce7f3" stroke="#db2777" rx="3" />
    <text x="35" y="81" class="code" font-size="11" fill="#9d174d">hello() ◀ 매치 성공! ("hello" === "hello")</text>

    <rect x="20" y="92" width="260" height="22" fill="#ffffff" stroke="#fbcfe8" rx="3" />
    <text x="35" y="107" class="code" font-size="11">bye()</text>
  </g>

  <!-- Step 3: Function Execution -->
  <g transform="translate(440, 310)">
    <rect width="300" height="90" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="6" />
    <text x="15" y="30" class="code" fill="#1e40af">function hello() {</text>
    <text x="35" y="50" class="code">echo "hello() 실행";</text>
    <text x="15" y="75" class="code" fill="#1e40af">}</text>
  </g>

  <!-- Flow Lines linking left and right -->
  <!-- Call evaluation points to Symbol Table lookup -->
  <path d="M 360 325 C 400 325, 410 200, 435 200" class="line-flow-pink" marker-end="url(#arrow-pink)" stroke-dasharray="3 3" />
  
  <!-- Matching points down to actual execution -->
  <path d="M 590 260 L 590 300" class="line-flow-blue" marker-end="url(#arrow-blue)" />
</svg>
