<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; text-anchor: middle; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    
    .box-input { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8px; }
    .box-cond { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 8px; }
    .box-action { fill: #f0fdf4; stroke: #10b981; stroke-width: 2; rx: 8px; }
    .box-default { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 8px; }
    .box-error { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 8px; }
    
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .line-active { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .line-success { stroke: #10b981; stroke-width: 2.5; fill: none; }
    .line-error { stroke: #ef4444; stroke-width: 2; fill: none; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="780" height="400" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <text x="30" y="45" class="title">Match 표현식 (Match Expression) 작동 흐름도</text>

  <!-- Input -->
  <rect x="330" y="70" width="140" height="40" class="box-input" />
  <text x="400" y="95" class="label">입력값 ($x)</text>
  
  <path d="M 400 110 L 400 145" class="line-active" marker-end="url(#arrow-blue)" />

  <!-- Match Evaluator -->
  <rect x="300" y="150" width="200" height="50" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" rx="8" />
  <text x="400" y="180" class="label" fill="#0369a1">match ($x)</text>

  <!-- Step 1: Strict Check 1 -->
  <path d="M 300 175 L 180 175 L 180 225" class="line-success" marker-end="url(#arrow-green)" />
  <text x="230" y="165" class="arrow-text" fill="#10b981">$x === 조건1</text>

  <rect x="110" y="230" width="140" height="40" class="box-action" />
  <text x="180" y="255" class="label" fill="#16803d">결과값 1 반환</text>

  <!-- Step 2: Strict Check 2 -->
  <path d="M 400 200 L 400 225" class="line" marker-end="url(#arrow)" />
  <text x="455" y="218" class="arrow-text">$x === 조건2</text>

  <rect x="330" y="230" width="140" height="40" class="box-action" />
  <text x="400" y="255" class="label" fill="#16803d">결과값 2 반환</text>

  <!-- Step 3: Default Check -->
  <path d="M 500 175 L 620 175 L 620 225" class="line" marker-end="url(#arrow)" />
  <text x="570" y="165" class="arrow-text">일치 없음 &amp; default 있음</text>

  <rect x="550" y="230" width="140" height="40" class="box-default" />
  <text x="620" y="255" class="label">기본 반환값</text>

  <!-- Exception Path -->
  <path d="M 620 175 L 720 175 L 720 295" class="line-error" marker-end="url(#arrow-red)" />
  <text x="735" y="200" class="arrow-text" fill="#ef4444" text-anchor="start">일치 없음 &amp;</text>
  <text x="735" y="215" class="arrow-text" fill="#ef4444" text-anchor="start">default 없음</text>

  <rect x="630" y="300" width="160" height="50" class="box-error" />
  <text x="710" y="322" class="label" fill="#b91c1c" font-size="12">UnhandledMatchError</text>
  <text x="710" y="338" class="label" fill="#b91c1c" font-size="11">런타임 예외 발생</text>

  <!-- Merging for output -->
  <path d="M 180 270 L 180 370 L 380 370" class="line" />
  <path d="M 400 270 L 400 370" class="line" />
  <path d="M 620 270 L 620 370 L 420 370" class="line" marker-end="url(#arrow)" />

  <circle cx="400" cy="370" r="5" fill="#94a3b8" />
</svg>
