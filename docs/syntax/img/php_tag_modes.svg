<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
    <linearGradient id="shortGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>
  </defs>

  <style>
    .bg-main { fill: #f8fafc; }
    .bg-inner { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #475569; }
    
    .panel-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 800; text-anchor: middle; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; text-anchor: middle; }
    .text-normal { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #334155; }
    .code-text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 10.5px; fill: #0f172a; }
    
    .panel-tag { fill: url(#tagGrad); stroke: #6ee7b7; stroke-width: 1.2; rx: 10px; filter: url(#shadow); }
    .panel-short { fill: url(#shortGrad); stroke: #7dd3fc; stroke-width: 1.2; rx: 10px; filter: url(#shadow); }
    .box-code { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 6px; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-main" rx="16" />
  <rect x="15" y="15" width="770" height="270" class="bg-inner" rx="12" />

  <!-- Header -->
  <text x="35" y="45" class="title">PHP 구문 해석 태그 모드 (Standard vs Short Echo)</text>
  <text x="35" y="63" class="subtitle">HTML 영역 안에서 PHP 코드가 인식 및 파싱되는 대표적인 두 가지 태그 기법</text>

  <!-- Left: Standard PHP Tag -->
  <rect x="35" y="85" width="350" height="180" class="panel-tag" />
  <text x="210" y="112" class="panel-title" fill="#065f46">1. 표준 PHP 태그 (&lt;?php ... ?&gt;)</text>
  
  <rect x="55" y="130" width="310" height="60" class="box-code" />
  <text x="70" y="152" class="code-text" font-weight="bold" fill="#065f46">&lt;?php</text>
  <text x="70" y="172" class="code-text">    echo $message;  // 표준 구문 제어 및 연산 수행</text>
  <text x="320" y="152" class="code-text" font-weight="bold" fill="#065f46">?&gt;</text>
  
  <text x="55" y="212" class="text-normal">✔ 변수 정의, 제어문(if, for), 함수 정의 등 모든 구조적 로직 처리 가능</text>
  <text x="55" y="228" class="text-normal">✔ 순수 PHP 코드만 작성하는 파일의 경우, 최하단 종료 태그(?&gt;) 생략 권장</text>
  <text x="55" y="244" class="text-normal" fill="#047857">✔ 파일 마지막 공백/개행이 HTML 응답으로 출력되는 오류 사전 예방</text>

  <!-- Right: Short Echo Tag -->
  <rect x="415" y="85" width="350" height="180" class="panel-short" />
  <text x="590" y="112" class="panel-title" fill="#0369a1">2. 단축 출력 태그 (&lt;?= ... ?&gt;)</text>

  <rect x="435" y="130" width="310" height="60" class="box-code" />
  <text x="450" y="152" class="code-text" font-weight="bold" fill="#0369a1">&lt;?=</text>
  <text x="490" y="152" class="code-text">$message</text>
  <text x="595" y="152" class="code-text" font-weight="bold" fill="#0369a1">?&gt;</text>
  <text x="450" y="174" class="code-text" fill="#475569">/* 묵시적으로 &lt;?php echo $message; ?&gt; 와 100% 동일 매핑 */</text>

  <text x="435" y="212" class="text-normal">✔ 템플릿(HTML) 내부에서 변수 값을 심플하게 출력할 때 사용</text>
  <text x="435" y="228" class="text-normal">✔ 주의: 태그 내부에 `echo` 키워드를 기술하면 구문 린트 오류 유발</text>
  <text x="435" y="244" class="text-normal" fill="#0284c7">✔ PHP 5.4.0 버전부터 php.ini 설정과 무관하게 언제나 기본 활성화</text>
</svg>
