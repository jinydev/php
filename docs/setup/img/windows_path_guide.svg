<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="badgeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f7ff" />
    </linearGradient>
    <linearGradient id="badgeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0fdf4" />
    </linearGradient>
    <linearGradient id="badgeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fef2f2" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#0284c7" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
  </defs>

  <style>
    .bg-main { fill: #f8fafc; }
    .bg-inner { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #475569; }
    
    .section-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 800; text-anchor: middle; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; text-anchor: middle; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 600; fill: #64748b; text-anchor: middle; }
    
    .box-container { fill: url(#winGrad); stroke: #bae6fd; stroke-width: 1.5; rx: 16px; }
    .badge-blue { fill: url(#badgeBlue); stroke: #0284c7; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    .badge-green { fill: url(#badgeGreen); stroke: #16a34a; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    .badge-red { fill: url(#badgeRed); stroke: #dc2626; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    
    .line-blue { stroke: #0284c7; stroke-width: 1.5; fill: none; }
    .line-green { stroke: #16a34a; stroke-width: 1.5; fill: none; }
    .line-red { stroke: #dc2626; stroke-width: 1.5; fill: none; }
    .line-gray { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
  </style>

  <!-- Background container -->
  <rect width="100%" height="100%" class="bg-main" rx="16" />
  <rect x="15" y="15" width="770" height="450" class="bg-inner" rx="12" />

  <!-- Title Section -->
  <text x="35" y="50" class="title">Windows CLI 환경의 PHP 실행 및 설정 탐색 흐름도</text>
  <text x="35" y="72" class="subtitle">명령 프롬프트에서 php 입력 시 시스템이 경로를 조회하고 php.ini 환경설정을 로드하는 프로세스</text>

  <!-- Container Box -->
  <rect x="40" y="100" width="720" height="330" class="box-container" />
  <text x="400" y="125" class="section-title" fill="#0369a1">Windows Command Execution &amp; Configuration Loading Workflow</text>

  <!-- Step 1: Terminal Input -->
  <rect x="60" y="160" width="130" height="50" class="badge-blue" />
  <text x="125" y="182" class="heading" fill="#0f172a">1. 터미널 명령 입력</text>
  <text x="125" y="196" class="arrow-text" font-size="9" fill="#0284c7">&gt; php -v (또는 스크립트)</text>

  <path d="M 190 185 L 240 185" class="line-blue" marker-end="url(#arrow-blue)" />
  <text x="215" y="175" class="arrow-text">탐색 시작</text>

  <!-- Step 2: Check current directory -->
  <rect x="250" y="150" width="160" height="70" class="badge-blue" />
  <text x="330" y="172" class="heading" fill="#0f172a">2. 현재 작업 디렉터리</text>
  <text x="330" y="188" class="arrow-text" font-size="9" fill="#64748b">현재 폴더 내에</text>
  <text x="330" y="202" class="arrow-text" font-size="9" fill="#0284c7">php.exe 파일이 존재합니까?</text>

  <!-- No path branch (to env path check) -->
  <path d="M 330 220 L 330 260" class="line-blue" marker-end="url(#arrow-blue)" />
  <text x="345" y="245" class="arrow-text">아니오</text>

  <!-- Step 3: Check Environment Variables Path -->
  <rect x="250" y="270" width="160" height="70" class="badge-blue" />
  <text x="330" y="292" class="heading" fill="#0f172a">3. 시스템 환경 변수 Path</text>
  <text x="330" y="308" class="arrow-text" font-size="9" fill="#64748b">등록된 디렉터리 목록 중</text>
  <text x="330" y="322" class="arrow-text" font-size="9" fill="#0284c7">C:\php\php.exe 가 존재합니까?</text>

  <!-- Yes branch from Step 2 to Execution -->
  <path d="M 410 185 L 530 185 A 10 10 0 0 1 540 195 L 540 230" class="line-green" marker-end="url(#arrow-green)" />
  <text x="470" y="175" class="arrow-text" fill="#16a34a">예 (즉시 실행)</text>

  <!-- Yes branch from Step 3 to Execution -->
  <path d="M 410 305 L 530 305 A 10 10 0 0 0 540 295 L 540 280" class="line-green" marker-end="url(#arrow-green)" />
  <text x="470" y="318" class="arrow-text" fill="#16a34a">예 (설정 경로 실행)</text>

  <!-- No branch from Step 3 (Error) -->
  <path d="M 250 305 L 190 305" class="line-red" marker-end="url(#arrow-gray)" />
  <text x="220" y="295" class="arrow-text" fill="#dc2626">아니오</text>

  <!-- Error Node -->
  <rect x="60" y="280" width="130" height="50" class="badge-red" />
  <text x="125" y="302" class="heading" fill="#991b1b">명령 실행 실패</text>
  <text x="125" y="316" class="arrow-text" font-size="8" fill="#ef4444">'php'은(는) 내부 또는 외부...</text>

  <!-- Step 4: Execute php.exe -->
  <rect x="470" y="230" width="120" height="50" class="badge-green" />
  <text x="530" y="252" class="heading" fill="#14532d">php.exe 로드</text>
  <text x="530" y="266" class="arrow-text" font-size="9" fill="#16a34a">인터프리터 엔진 가동</text>

  <path d="M 590 255 L 630 255" class="line-green" marker-end="url(#arrow-green)" />

  <!-- Step 5: Read Configuration File (php.ini) -->
  <rect x="630" y="190" width="110" height="130" class="badge-green" />
  <text x="685" y="215" class="heading" fill="#14532d">php.ini 탐색</text>
  <text x="685" y="235" class="arrow-text" font-size="8" fill="#4b5563">1. C:\php\php.ini</text>
  <text x="685" y="250" class="arrow-text" font-size="8" fill="#4b5563">2. 윈도우 디렉터리</text>
  <text x="685" y="265" class="arrow-text" font-size="8" fill="#4b5563">3. ext/ 확장 폴더</text>
  <text x="685" y="280" class="arrow-text" font-size="8" fill="#16a34a">모듈 로드 및 실행</text>
  <text x="685" y="295" class="arrow-text" font-size="8" fill="#4b5563">(pdo_mysql.dll 등)</text>

</svg>
