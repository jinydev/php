<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="xamppGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="badgeApache" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fef2f2" />
    </linearGradient>
    <linearGradient id="badgeMaria" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eff6ff" />
    </linearGradient>
    <linearGradient id="badgePhp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#faf5ff" />
    </linearGradient>
    <linearGradient id="badgeFolder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0fdf4" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
  </defs>

  <style>
    .bg-main { fill: #f8fafc; }
    .bg-inner { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #475569; }
    
    .section-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 800; text-anchor: middle; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; text-anchor: middle; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 600; fill: #64748b; text-anchor: middle; }
    
    .box-container { fill: url(#xamppGrad); stroke: #fed7aa; stroke-width: 1.5; rx: 16px; }
    
    .badge-apache { fill: url(#badgeApache); stroke: #ef4444; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    .badge-maria { fill: url(#badgeMaria); stroke: #3b82f6; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    .badge-php { fill: url(#badgePhp); stroke: #a855f7; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    .badge-folder { fill: url(#badgeFolder); stroke: #22c55e; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    
    .line-red { stroke: #dc2626; stroke-width: 1.5; fill: none; }
    .line-blue { stroke: #2563eb; stroke-width: 1.5; fill: none; }
    .line-green { stroke: #16a34a; stroke-width: 1.5; fill: none; }
    .line-gray { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
  </style>

  <!-- Background container -->
  <rect width="100%" height="100%" class="bg-main" rx="16" />
  <rect x="15" y="15" width="770" height="450" class="bg-inner" rx="12" />

  <!-- Title Section -->
  <text x="35" y="50" class="title">Windows XAMPP 통합 웹 개발 스택 아키텍처</text>
  <text x="35" y="72" class="subtitle">Apache Friends XAMPP 패키지의 컨트롤 패널 서비스 구조와 웹 요청 처리 및 설정 맵</text>

  <!-- Container Box -->
  <rect x="40" y="100" width="720" height="330" class="box-container" />
  <text x="400" y="125" class="section-title" fill="#c2410c">XAMPP Control Panel &amp; Runtime Port Mapping</text>

  <!-- Centered: XAMPP Control Panel Manager -->
  <rect x="290" y="150" width="220" height="80" rx="10" fill="#f8fafc" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="175" class="heading" fill="#7c2d12" font-size="14">XAMPP Control Panel</text>
  <text x="400" y="195" class="arrow-text" font-size="9" fill="#c2410c">서비스 모니터링 및 구동 제어 도구</text>
  <text x="400" y="212" class="arrow-text" font-size="9" fill="#94a3b8">(xampp-control.exe)</text>

  <!-- Arrows from Control Panel to Services -->
  <path d="M 290 190 L 195 190 A 10 10 0 0 0 185 200 L 185 240" class="line-red" marker-end="url(#arrow-red)" />
  <path d="M 510 190 L 605 190 A 10 10 0 0 1 615 200 L 615 240" class="line-blue" marker-end="url(#arrow-blue)" />

  <!-- Left: Apache HTTP Server & PHP -->
  <rect x="60" y="245" width="250" height="150" class="badge-apache" />
  <text x="185" y="268" class="heading" fill="#991b1b">Apache Web Server</text>
  <text x="185" y="284" class="arrow-text" font-size="9" fill="#dc2626">Port: 80 (HTTP) / 443 (HTTPS)</text>

  <!-- Nested PHP Module -->
  <rect x="75" y="295" width="220" height="85" class="badge-php" />
  <text x="185" y="315" class="heading" fill="#6b21a8">PHP Engine Module</text>
  <text x="185" y="332" class="arrow-text" font-size="8" fill="#7e22ce">설정: C:\xampp\php\php.ini</text>
  <text x="185" y="347" class="arrow-text" font-size="8" fill="#4b5563">Apache 프로세스 내부에서 직접 파싱</text>
  <text x="185" y="362" class="arrow-text" font-size="8" fill="#9333ea">(PHP 8.x NTS / TS 지원)</text>

  <!-- Right: MariaDB Database Server -->
  <rect x="490" y="245" width="250" height="150" class="badge-maria" />
  <text x="615" y="268" class="heading" fill="#1e3a8a">MariaDB (MySQL) Database</text>
  <text x="615" y="284" class="arrow-text" font-size="9" fill="#2563eb">Port: 3306</text>
  <text x="615" y="302" class="arrow-text" font-size="8" fill="#475569">설정: C:\xampp\mysql\bin\my.ini</text>
  
  <rect x="505" y="320" width="220" height="60" fill="#eff6ff" stroke="#93c5fd" rx="6" />
  <text x="615" y="338" class="heading" font-size="10" fill="#1d4ed8">phpMyAdmin 내장</text>
  <text x="615" y="352" class="arrow-text" font-size="8" fill="#1e40af">웹기반 DB GUI 관리 환경 지원</text>
  <text x="615" y="365" class="arrow-text" font-size="8" fill="#1e40af">(http://localhost/phpmyadmin)</text>

  <!-- Bottom: Web Roots / Source Code Folder -->
  <rect x="330" y="340" width="140" height="55" class="badge-folder" />
  <text x="400" y="360" class="heading" fill="#166534">문서 최상위 폴더</text>
  <text x="400" y="375" class="arrow-text" font-size="9" fill="#16a34a">C:\xampp\htdocs</text>

  <!-- Connecting paths -->
  <path d="M 310 365 L 330 365" class="line-green" />
  <text x="320" y="355" class="arrow-text" fill="#16a34a">참조</text>

</svg>
