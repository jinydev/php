<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <text x="400" y="35" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="18" text-anchor="middle">MVC 패턴 및 템플릿 렌더링 데이터 흐름</text>

  <!-- Client -->
  <g transform="translate(40, 150)" filter="url(#shadow)">
    <rect width="110" height="120" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" />
    <text x="55" y="65" fill="#1e40af" font-family="'Inter', sans-serif" font-weight="800" font-size="13" text-anchor="middle">브라우저</text>
    <text x="55" y="82" fill="#1e40af" font-family="'Inter', sans-serif" font-weight="500" font-size="10" text-anchor="middle">(Client)</text>
  </g>

  <!-- Controller -->
  <g transform="translate(240, 150)" filter="url(#shadow)">
    <rect width="140" height="120" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2" />
    <text x="70" y="65" fill="#6d28d9" font-family="'Inter', sans-serif" font-weight="800" font-size="13" text-anchor="middle">컨트롤러 (Controller)</text>
    <text x="70" y="82" fill="#6d28d9" font-family="'Inter', sans-serif" font-weight="500" font-size="10" text-anchor="middle">비즈니스 흐름 제어</text>
  </g>

  <!-- Model -->
  <g transform="translate(470, 70)" filter="url(#shadow)">
    <rect width="140" height="100" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" />
    <text x="70" y="55" fill="#c2410c" font-family="'Inter', sans-serif" font-weight="800" font-size="13" text-anchor="middle">모델 (Model)</text>
    <text x="70" y="72" fill="#c2410c" font-family="'Inter', sans-serif" font-weight="500" font-size="10" text-anchor="middle">데이터 검증 &amp; CRUD</text>
  </g>

  <!-- View -->
  <g transform="translate(470, 250)" filter="url(#shadow)">
    <rect width="140" height="100" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2" />
    <text x="70" y="55" fill="#166534" font-family="'Inter', sans-serif" font-weight="800" font-size="13" text-anchor="middle">뷰 (View)</text>
    <text x="70" y="72" fill="#166534" font-family="'Inter', sans-serif" font-weight="500" font-size="10" text-anchor="middle">HTML 템플릿 컴파일</text>
  </g>

  <!-- DB (Far right) -->
  <g transform="translate(690, 70)" filter="url(#shadow)">
    <rect width="80" height="100" rx="12" fill="#fcf6e8" stroke="#fef08a" stroke-width="2" />
    <text x="40" y="55" fill="#854d0e" font-family="'Inter', sans-serif" font-weight="800" font-size="13" text-anchor="middle">DB</text>
  </g>

  <!-- Connectors -->
  <!-- 1. Request -->
  <path d="M 150,190 L 238,190" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  <text x="194" y="180" fill="#2563eb" font-family="'Inter', sans-serif" font-weight="700" font-size="10" text-anchor="middle">1. Request</text>

  <!-- 2. Controller -> Model -->
  <path d="M 340,150 L 468,110" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="390" y="122" fill="#64748b" font-family="'Inter', sans-serif" font-weight="700" font-size="9" text-anchor="middle">2. 데이터 요청</text>

  <!-- 3. Model -> DB -->
  <path d="M 610,110 L 688,110" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- 4. DB -> Model -->
  <path d="M 688,130 L 612,130" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 5. Model -> Controller -->
  <path d="M 468,135 L 350,170" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="410" y="165" fill="#64748b" font-family="'Inter', sans-serif" font-weight="700" font-size="9" text-anchor="middle">3. 데이터 전달</text>

  <!-- 6. Controller -> View -->
  <path d="M 350,250 L 468,280" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="390" y="278" fill="#64748b" font-family="'Inter', sans-serif" font-weight="700" font-size="9" text-anchor="middle">4. 데이터 주입</text>

  <!-- 7. View -> Controller -->
  <path d="M 468,300 L 330,272" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="410" y="306" fill="#64748b" font-family="'Inter', sans-serif" font-weight="700" font-size="9" text-anchor="middle">5. HTML 반환</text>

  <!-- 8. Response -->
  <path d="M 238,230 L 152,230" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow)" />
  <text x="194" y="248" fill="#059669" font-family="'Inter', sans-serif" font-weight="700" font-size="10" text-anchor="middle">6. Response (HTML)</text>
</svg>
