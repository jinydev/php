<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#059669" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fafafa" rx="12" />

  <!-- Title Left -->
  <text x="210" y="40" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="16" text-anchor="middle">정적 웹 페이지 (Static Page)</text>
  <!-- Title Right -->
  <text x="590" y="40" fill="#1e293b" font-family="'Inter', sans-serif" font-weight="800" font-size="16" text-anchor="middle">동적 웹 페이지 (Dynamic Page)</text>

  <!-- Center Divider Line -->
  <line x1="400" y1="20" x2="400" y2="400" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4" />

  <!-- LEFT: STATIC SYSTEM -->
  <g transform="translate(30, 70)">
    <!-- Browser -->
    <rect x="10" y="20" width="100" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)" />
    <text x="60" y="60" fill="#1e40af" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">브라우저</text>
    
    <!-- Web Server -->
    <rect x="230" y="20" width="100" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <text x="280" y="60" fill="#334155" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">웹 서버</text>

    <!-- File Disk -->
    <rect x="230" y="200" width="100" height="70" rx="8" fill="#fcf6e8" stroke="#fef08a" stroke-width="2" filter="url(#shadow)" />
    <text x="280" y="235" fill="#854d0e" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">서버 디스크</text>
    <text x="280" y="252" fill="#a16207" font-family="'Inter', sans-serif" font-weight="400" font-size="11" text-anchor="middle">HTML/CSS 파일</text>

    <!-- Arrows -->
    <path d="M 110,45 L 220,45" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text x="165" y="35" fill="#2563eb" font-family="'Inter', sans-serif" font-weight="600" font-size="10" text-anchor="middle">about.html 요청</text>
    
    <path d="M 280,90 L 280,190" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="320" y="145" fill="#64748b" font-family="'Inter', sans-serif" font-weight="600" font-size="10" text-anchor="start">파일 탐색 &amp; 로드</text>

    <path d="M 230,75 L 120,75" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)" />
    <text x="165" y="92" fill="#059669" font-family="'Inter', sans-serif" font-weight="600" font-size="10" text-anchor="middle">HTML 파일 그대로 응답</text>

    <text x="170" y="315" fill="#64748b" font-family="'Inter', sans-serif" font-weight="500" font-size="12" text-anchor="middle">
      * 서버에 미리 저장된 정적 파일을
    </text>
    <text x="170" y="333" fill="#64748b" font-family="'Inter', sans-serif" font-weight="500" font-size="12" text-anchor="middle">
      어떠한 연산 가공 없이 그대로 브라우저에 반환합니다.
    </text>
  </g>

  <!-- RIGHT: DYNAMIC SYSTEM -->
  <g transform="translate(420, 70)">
    <!-- Browser -->
    <rect x="10" y="20" width="100" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)" />
    <text x="60" y="60" fill="#1e40af" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">브라우저</text>
    
    <!-- Web Server -->
    <rect x="140" y="20" width="90" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
    <text x="185" y="60" fill="#334155" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">웹 서버</text>

    <!-- PHP Engine -->
    <rect x="260" y="20" width="90" height="70" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2" filter="url(#shadow)" />
    <text x="305" y="60" fill="#6d28d9" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">PHP 엔진</text>

    <!-- DB -->
    <rect x="260" y="170" width="90" height="70" rx="8" fill="#fff7ed" stroke="#ffedd5" stroke-width="2" filter="url(#shadow)" />
    <text x="305" y="210" fill="#c2410c" font-family="'Inter', sans-serif" font-weight="700" font-size="13" text-anchor="middle">DB (MySQL)</text>

    <!-- Arrows -->
    <path d="M 110,40 L 135,40" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text x="122" y="32" fill="#2563eb" font-family="'Inter', sans-serif" font-weight="600" font-size="8" text-anchor="middle">board.php 요청</text>
    
    <path d="M 230,40 L 255,40" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="242" y="32" fill="#64748b" font-family="'Inter', sans-serif" font-weight="600" font-size="8" text-anchor="middle">스크립트 위임</text>

    <path d="M 290,90 L 290,160" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 320,160 L 320,95" fill="none" stroke="#c2410c" stroke-width="2" marker-end="url(#arrow)" />
    <text x="272" y="130" fill="#64748b" font-family="'Inter', sans-serif" font-weight="600" font-size="8" text-anchor="middle">쿼리 실행</text>
    <text x="338" y="130" fill="#c2410c" font-family="'Inter', sans-serif" font-weight="600" font-size="8" text-anchor="middle">데이터 반환</text>

    <path d="M 260,70 L 235,70" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)" />
    <text x="248" y="85" fill="#059669" font-family="'Inter', sans-serif" font-weight="600" font-size="8" text-anchor="middle">HTML 렌더링</text>

    <path d="M 140,70 L 120,70" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)" />
    <text x="80" y="88" fill="#059669" font-family="'Inter', sans-serif" font-weight="600" font-size="8" text-anchor="middle">동적 HTML 응답</text>

    <text x="180" y="315" fill="#64748b" font-family="'Inter', sans-serif" font-weight="500" font-size="12" text-anchor="middle">
      * 요청 시마다 PHP 엔진이 데이터베이스 데이터를
    </text>
    <text x="180" y="333" fill="#64748b" font-family="'Inter', sans-serif" font-weight="500" font-size="12" text-anchor="middle">
      결합해 즉석에서 새로운 HTML을 조립한 후 반환합니다.
    </text>
  </g>
</svg>
