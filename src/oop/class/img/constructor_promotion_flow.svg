<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #334155; text-anchor: middle; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 11px; font-weight: 500; fill: #0f172a; text-anchor: start; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    
    .box-left { fill: #fef2f2; stroke: #f87171; stroke-width: 1.5; rx: 8px; }
    .box-right { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; rx: 8px; }
    
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .line-active { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="700" height="300" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <text x="30" y="45" class="title">생성자 프로퍼티 프로모션 비교</text>

  <!-- PHP 7: Traditional Boilerplate -->
  <text x="50" y="80" class="label" font-weight="700" fill="#dc2626" text-anchor="start">기존 방식 (PHP 7 이하 - 3개 영역 중복)</text>
  
  <rect x="50" y="95" width="280" height="180" class="box-left" />
  <g transform="translate(65, 115)">
    <text y="0" class="code" fill="#991b1b" font-weight="700">class User {</text>
    <text y="20" class="code" fill="#ef4444">  public string $name; // 1) 속성 정의</text>
    <text y="40" class="code" fill="#991b1b">  </text>
    <text y="60" class="code" fill="#ef4444">  public function __construct(string $name) { // 2) 인수</text>
    <text y="80" class="code" fill="#ef4444">    $this-&gt;name = $name; // 3) 대입 바인딩</text>
    <text y="100" class="code" fill="#991b1b">  }</text>
    <text y="120" class="code" fill="#991b1b">}</text>
  </g>

  <!-- Arrow -->
  <path d="M 350 185 L 375 185" class="line-active" marker-end="url(#arrow)" />
  <text x="362" y="170" class="arrow-text" fill="#3b82f6">축소</text>

  <!-- PHP 8: Property Promotion -->
  <text x="390" y="80" class="label" font-weight="700" fill="#166534" text-anchor="start">개선 방식 (PHP 8.0 이상 - 단축 선언)</text>

  <rect x="390" y="95" width="280" height="180" class="box-right" />
  <g transform="translate(405, 115)">
    <text y="0" class="code" fill="#14532d" font-weight="700">class User {</text>
    <text y="20" class="code" fill="#15803d">  // 생성자 인자 앞에 접근제어자를 명시</text>
    <text y="40" class="code" fill="#15803d">  // ➡️ 속성 등록 + 인수 수용 + 대입 자동화!</text>
    <text y="60" class="code" fill="#166534" font-weight="700">  public function __construct(</text>
    <text y="80" class="code" fill="#16a34a" font-weight="700">    public string $name</text>
    <text y="100" class="code" fill="#166534" font-weight="700">  ) {}</text>
    <text y="120" class="code" fill="#14532d" font-weight="700">}</text>
  </g>
</svg>
