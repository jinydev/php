<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #334155; text-anchor: middle; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    
    .box-interface { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 8px; }
    .box-app { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8px; }
    .box-anno { fill: #f0fdf4; stroke: #10b981; stroke-width: 2; rx: 8px; }
    
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .line-active { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .line-success { stroke: #10b981; stroke-width: 2.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="620" height="280" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <text x="30" y="45" class="title">익명 클래스 (Anonymous Class) 의존성 주입 흐름</text>

  <!-- Logger Interface -->
  <rect x="40" y="80" width="180" height="60" class="box-interface" />
  <text x="130" y="105" class="label" font-weight="700" fill="#b45309">&lt;&lt;interface&gt;&gt;</text>
  <text x="130" y="125" class="code" fill="#b45309">Logger (log())</text>

  <!-- Application Class -->
  <rect x="380" y="80" width="220" height="60" class="box-app" />
  <text x="490" y="105" class="label" font-weight="700" fill="#1d4ed8">Application</text>
  <text x="490" y="125" class="code" fill="#1d4ed8">setLogger(Logger $logger)</text>

  <!-- Interface Requirement Line -->
  <path d="M 380 110 L 230 110" class="line" stroke-dasharray="5 5" marker-end="url(#arrow)" />
  <text x="305" y="100" class="arrow-text">의존성 요구</text>

  <!-- Anonymous Class (on-the-fly) -->
  <rect x="200" y="200" width="240" height="60" class="box-anno" />
  <text x="320" y="225" class="label" font-weight="700" fill="#047857">new class implements Logger</text>
  <text x="320" y="245" class="code" fill="#047857">log(string $msg) { ... }</text>

  <!-- Implements Line -->
  <path d="M 230 200 L 130 145" class="line-success" marker-end="url(#arrow-green)" />
  <text x="150" y="190" class="arrow-text" fill="#10b981">인터페이스 구현</text>

  <!-- Injection Line -->
  <path d="M 410 200 L 490 145" class="line-active" marker-end="url(#arrow-blue)" />
  <text x="475" y="190" class="arrow-text" fill="#3b82f6">실시간 주입</text>
</svg>
