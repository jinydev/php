<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="localGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="gitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#0284c7" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#ef4444" />
    </marker>
  </defs>

  <style>
    .bg-main { fill: #f8fafc; }
    .bg-inner { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #475569; }
    
    .panel-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 800; text-anchor: middle; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 700; text-anchor: middle; }
    .text-normal { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 500; fill: #334155; }
    .text-center { text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: 600; fill: #64748b; text-anchor: middle; }
    
    .panel-local { fill: url(#localGrad); stroke: #cbd5e1; stroke-width: 1.5; rx: 12px; }
    .panel-git { fill: url(#gitGrad); stroke: #fed7d7; stroke-width: 1.5; rx: 12px; }
    .panel-server { fill: url(#serverGrad); stroke: #a7f3d0; stroke-width: 1.5; rx: 12px; filter: url(#shadow); }
    
    .box-container { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 6px; }
    
    .line-blue { stroke: #0284c7; stroke-width: 1.8; fill: none; }
    .line-orange { stroke: #ea580c; stroke-width: 1.8; fill: none; }
    .line-red { stroke: #ef4444; stroke-width: 1.8; fill: none; }
    .line-dashed { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-main" rx="16" />
  <rect x="15" y="15" width="770" height="430" class="bg-inner" rx="12" />

  <!-- Header -->
  <text x="35" y="48" class="title">Git 배포 파이프라인 및 신속한 롤백(Rollback) 워크플로우</text>
  <text x="35" y="68" class="subtitle">개발 환경의 코드 푸시가 중앙 빌드 검증을 거친 후 웹 서버에 무중단 배포되고, 문제 발생 시 즉시 이전 버전으로 복구하는 구조</text>

  <!-- 1. Local Workspace (개발자 PC) -->
  <rect x="35" y="95" width="210" height="325" class="panel-local" />
  <text x="140" y="120" class="panel-title" fill="#1e293b">1. 개발 환경 (Local Workspace)</text>

  <rect x="50" y="145" width="180" height="80" class="box-container" />
  <text x="140" y="165" class="heading" fill="#0f172a">코드 작업 및 커밋</text>
  <text x="140" y="185" class="text-normal text-center" fill="#475569">개발 디렉터리 내 수정</text>
  <text x="140" y="205" class="text-normal text-center" font-family="monospace" fill="#0284c7">git commit -am "v2.0"</text>

  <rect x="50" y="245" width="180" height="155" class="box-container" />
  <text x="140" y="265" class="heading" fill="#0f172a">개발 완료 배포 요청</text>
  <text x="140" y="285" class="text-normal text-center" font-family="monospace" fill="#ea580c">git push origin main</text>
  <path d="M 65 315 L 215 315" class="line-dashed" />
  <text x="140" y="335" class="heading" fill="#991b1b">⚠️ 롤백 명령 트리거</text>
  <text x="140" y="355" class="text-normal text-center" font-family="monospace" fill="#ef4444">git reset --hard v1.0</text>
  <text x="140" y="375" class="text-normal text-center" font-family="monospace" fill="#ef4444">또는 심볼릭 링크 원복</text>

  <!-- Connection: Push -->
  <path d="M 245 285 L 285 285" class="line-orange" marker-end="url(#arrow-orange)" />
  <text x="265" y="275" class="arrow-text" fill="#ea580c">Push</text>

  <!-- Connection: Reset (Rollback) -->
  <path d="M 520 370 L 245 370" class="line-red" marker-end="url(#arrow-red)" />
  <text x="350" y="390" class="arrow-text" fill="#ef4444">장애 극복 롤백 시그널</text>

  <!-- 2. GitHub / Remote Git Repo -->
  <rect x="285" y="95" width="220" height="325" class="panel-git" />
  <text x="395" y="120" class="panel-title" fill="#7c2d12">2. 원격 저장소 &amp; CI/CD</text>

  <rect x="300" y="145" width="190" height="80" class="box-container" />
  <text x="395" y="165" class="heading" fill="#ea580c">GitHub 원격 리포지토리</text>
  <text x="395" y="185" class="text-normal text-center">배포용 최종 소스 코드와</text>
  <text x="395" y="205" class="text-normal text-center">전체 변경 이력(Commit log) 보존</text>

  <rect x="300" y="245" width="190" height="155" class="box-container" />
  <text x="395" y="265" class="heading" fill="#ea580c">CI/CD (GitHub Actions)</text>
  <text x="395" y="290" class="text-normal text-center">✔ 1단계: PHP 구문 검증(Lint)</text>
  <text x="395" y="310" class="text-normal text-center">✔ 2단계: 유닛 테스트 실행</text>
  <text x="395" y="330" class="text-normal text-center">✔ 3단계: 빌드 패키징 처리</text>
  <text x="395" y="355" class="heading" fill="#16a34a">배포 통과 (Success)</text>

  <!-- Connection: CI trigger inside -->
  <path d="M 395 225 L 395 245" class="line-dashed" />

  <!-- Connection: Deploy Trigger -->
  <path d="M 505 322 L 540 322" class="line-blue" marker-end="url(#arrow-blue)" />
  <text x="522" y="312" class="arrow-text" fill="#0284c7">배포</text>

  <!-- 3. Web Server (상용 운영 서버) -->
  <rect x="540" y="95" width="225" height="325" class="panel-server" />
  <text x="652" y="120" class="panel-title" fill="#065f46">3. 웹 서버 (Web Server)</text>

  <!-- Releases directories -->
  <rect x="555" y="145" width="195" height="155" class="box-container" />
  <text x="652" y="165" class="heading" fill="#047857">Releases 디렉터리 세트</text>
  
  <rect x="570" y="185" width="165" height="26" rx="4" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="652" y="202" class="text-normal text-center">/var/www/releases/v2.0 (신규)</text>
  
  <rect x="570" y="220" width="165" height="26" rx="4" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="652" y="237" class="text-normal text-center" fill="#64748b">/var/www/releases/v1.0 (이전)</text>

  <rect x="570" y="255" width="165" height="32" rx="4" fill="#fef2f2" stroke="#fca5a5" />
  <text x="652" y="268" class="heading" font-size="9" fill="#dc2626">장애 시 심볼릭 링크를</text>
  <text x="652" y="280" class="heading" font-size="9" fill="#dc2626">v1.0 디렉터리로 즉각 변경</text>

  <!-- Symbolic Link (Current) -->
  <rect x="555" y="315" width="195" height="85" class="box-container" stroke="#10b981" stroke-width="1.5" />
  <text x="652" y="332" class="heading" fill="#047857">심볼릭 링크 (Symbolic Link)</text>
  <text x="652" y="352" class="heading" font-size="12" fill="#059669">/var/www/html (웹루트)</text>
  <path d="M 652 365 L 652 287" class="line-green" marker-end="url(#arrow-blue)" />
  <text x="652" y="380" class="arrow-text" fill="#16a34a">가리키는 타겟 디렉터리</text>

</svg>
