<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="auto">
  <!-- Clean white background with rounded border -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12"/>
  <rect x="5" y="5" width="590" height="190" rx="10" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  
  <!-- Main Title -->
  <text x="30" y="35" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0f172a">PHP 변수명 구성 요소 (Anatomy of a Variable Name)</text>
  
  <!-- The Variable Name Text -->
  <g transform="translate(45, 110)">
    <!-- Dollar Sign -->
    <text x="0" y="0" font-family="Monaco, 'Courier New', monospace" font-size="36" font-weight="bold" fill="#3b82f6">$</text>
    <!-- First Char -->
    <text x="25" y="0" font-family="Monaco, 'Courier New', monospace" font-size="36" font-weight="bold" fill="#10b981">u</text>
    <!-- Remaining chars -->
    <text x="50" y="0" font-family="Monaco, 'Courier New', monospace" font-size="36" font-weight="bold" fill="#1e293b">ser_age1</text>
  </g>
  
  <!-- Guidelines and Labels -->
  <!-- 1. Dollar Sign ($) -->
  <path d="M 50 125 L 50 155 L 75 155" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="50" cy="125" r="3" fill="#3b82f6"/>
  <text x="85" y="159" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3b82f6">① 달러($) 기호 (필수)</text>
  
  <!-- 2. First Char (u) -->
  <path d="M 75 75 L 75 55 L 100 55" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="75" cy="75" r="3" fill="#10b981"/>
  <text x="110" y="59" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#10b981">② 첫 글자: 영문자 또는 언더스코어(_)만 가능 (숫자 금지)</text>
  
  <!-- 3. Remaining (ser_age1) -->
  <path d="M 160 125 L 160 155 L 235 155" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="160" cy="125" r="3" fill="#64748b"/>
  <text x="245" y="159" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b">③ 나머지: 영문, 숫자, 언더스코어(_) 조합 가능 (공백 금지)</text>
</svg>
