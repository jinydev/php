<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; text-anchor: middle; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    
    .box-input { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8px; }
    .box-cond { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 8px; }
    .box-action { fill: #faf5ff; stroke: #a855f7; stroke-width: 2; rx: 8px; }
    .box-default { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 8px; }
    
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    .line-active { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .line-success { stroke: #10b981; stroke-width: 2.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="580" height="340" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <text x="30" y="45" class="title">우주선 연산자 ($a &lt;=&gt; $b) 비교 흐름도</text>

  <!-- Input -->
  <rect x="220" y="70" width="160" height="40" class="box-input" />
  <text x="300" y="95" class="label">비교식 ($a &lt;=&gt; $b)</text>
  
  <path d="M 300 110 L 300 145" class="line-active" marker-end="url(#arrow-blue)" />

  <!-- Condition Node -->
  <rect x="220" y="150" width="160" height="50" class="box-cond" />
  <text x="300" y="180" class="label">대소 비교 평가</text>

  <!-- Left Branch: $a < $b -->
  <path d="M 220 175 L 120 175 L 120 235" class="line" marker-end="url(#arrow)" />
  <text x="160" y="165" class="arrow-text">$a &lt; $b</text>

  <rect x="60" y="240" width="120" height="40" class="box-action" />
  <text x="120" y="265" class="label">반환값: -1</text>

  <!-- Middle Branch: $a == $b -->
  <path d="M 300 200 L 300 235" class="line-success" marker-end="url(#arrow-green)" />
  <text x="325" y="220" class="arrow-text" fill="#10b981">$a == $b</text>

  <rect x="240" y="240" width="120" height="40" class="box-cond" style="fill: #f0fdf4; stroke: #10b981;" />
  <text x="300" y="265" class="label" fill="#15803d">반환값: 0</text>

  <!-- Right Branch: $a > $b -->
  <path d="M 380 175 L 480 175 L 480 235" class="line" marker-end="url(#arrow)" />
  <text x="440" y="165" class="arrow-text">$a &gt; $b</text>

  <rect x="420" y="240" width="120" height="40" class="box-default" />
  <text x="480" y="265" class="label">반환값: 1</text>
</svg>
