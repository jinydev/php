<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #334155; text-anchor: middle; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    
    .box-call { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 6px; }
    .box-decl { fill: #f0fdf4; stroke: #10b981; stroke-width: 2; rx: 6px; }
    .box-default { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 6px; }
    
    .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 4 4; }
    .line-bind { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .line-success { stroke: #10b981; stroke-width: 2.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="580" height="280" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <text x="30" y="45" class="title">네임드 인자 (Named Arguments) 매핑 흐름</text>

  <!-- Function Call (Caller) -->
  <text x="30" y="80" class="label" font-weight="700" fill="#3b82f6" text-anchor="start">1. 함수 호출 (순서 변경)</text>
  
  <rect x="30" y="95" width="200" height="40" class="box-call" />
  <text x="130" y="120" class="code" fill="#2563eb">age: 27</text>

  <rect x="250" y="95" width="200" height="40" class="box-call" />
  <text x="350" y="120" class="code" fill="#2563eb">name: '이순신'</text>

  <!-- Function Definition (Callee) -->
  <text x="30" y="200" class="label" font-weight="700" fill="#10b981" text-anchor="start">2. 함수 매개변수 바인딩</text>

  <rect x="30" y="215" width="120" height="40" class="box-decl" />
  <text x="90" y="240" class="code" fill="#166534">$name</text>

  <rect x="170" y="215" width="120" height="40" class="box-decl" />
  <text x="230" y="240" class="code" fill="#166534">$age</text>

  <rect x="310" y="215" width="120" height="40" class="box-default" />
  <text x="370" y="240" class="code" fill="#475569">$role = 'User'</text>
  <text x="370" y="275" class="label" font-size="11" fill="#64748b">(기본값 유지)</text>

  <rect x="450" y="215" width="120" height="40" class="box-default" />
  <text x="510" y="240" class="code" fill="#475569">$country = 'KR'</text>
  <text x="510" y="275" class="label" font-size="11" fill="#64748b">(기본값 유지)</text>

  <!-- Binding Lines -->
  <!-- age mapping -->
  <path d="M 130 135 L 130 170 L 230 170 L 230 210" class="line-bind" marker-end="url(#arrow-blue)" />
  
  <!-- name mapping -->
  <path d="M 350 135 L 350 170 L 90 170 L 90 210" class="line-success" marker-end="url(#arrow-green)" />
</svg>
