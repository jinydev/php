<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="compilerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="interpreterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f7ff" />
      <stop offset="100%" stop-color="#e0effe" />
    </linearGradient>
    <linearGradient id="badgeAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="100%" stop-color="#fef3c7" />
    </linearGradient>
    <linearGradient id="badgeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#dcfce7" />
    </linearGradient>
    <linearGradient id="badgeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>

  <style>
    .bg-main { fill: #f8fafc; }
    .bg-inner { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #475569; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 500; fill: #64748b; text-anchor: middle; }
    
    .box-compiler { fill: url(#compilerGrad); stroke: #cbd5e1; stroke-width: 1.5; rx: 16px; }
    .box-interpreter { fill: url(#interpreterGrad); stroke: #93c5fd; stroke-width: 1.5; rx: 16px; }
    
    .badge { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 8px; filter: url(#shadow); }
    .badge-active { fill: url(#badgeBlue); stroke: #3b82f6; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }
    .badge-amber { fill: url(#badgeAmber); stroke: #fbbf24; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }
    .badge-green { fill: url(#badgeGreen); stroke: #34d399; stroke-width: 1.5; rx: 8px; filter: url(#shadow); }

    .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
    .line-active { stroke: #3b82f6; stroke-width: 2; fill: none; }
    .line-success { stroke: #10b981; stroke-width: 2; fill: none; }
  </style>

  <!-- Background container -->
  <rect width="100%" height="100%" class="bg-main" rx="16" />
  <rect x="15" y="15" width="770" height="420" class="bg-inner" rx="12" />

  <!-- Title Section -->
  <text x="35" y="50" class="title">컴파일러(Compiler) vs 인터프리터(Interpreter) 실행 흐름</text>
  <text x="35" y="72" class="subtitle">소스코드의 해석 방식과 번역 시점에 따른 프로그래밍 런타임의 결정적 대조</text>

  <!-- Left: Compiler Space (Center X = 210) -->
  <rect x="40" y="100" width="340" height="300" class="box-compiler" />
  <text x="210" y="132" class="heading" fill="#475569">컴파일러 방식 (C, C++, Go 등)</text>

  <!-- Source -->
  <rect x="110" y="150" width="200" height="40" class="badge" />
  <text x="210" y="174" class="heading" font-size="12" fill="#475569">1. 고수준 소스 코드 (.c / .go)</text>

  <path d="M 210 190 L 210 220" class="line" marker-end="url(#arrow)" />
  <text x="260" y="211" class="arrow-text">빌드 타임 번역</text>

  <!-- Executable Binary -->
  <rect x="110" y="225" width="200" height="45" class="badge" fill="#f8fafc" />
  <text x="210" y="244" class="heading" font-size="12" fill="#1e293b">2. 기계어 실행 파일 (.exe / .bin)</text>
  <text x="210" y="260" class="arrow-text" font-size="10" fill="#94a3b8">(컴퓨터가 직접 실행할 수 있는 파일)</text>

  <path d="M 210 270 L 210 305" class="line" marker-end="url(#arrow)" />
  <text x="255" y="293" class="arrow-text">OS 메모리 로드</text>

  <!-- Run -->
  <rect x="110" y="310" width="200" height="40" class="badge" />
  <text x="210" y="334" class="heading" font-size="12" fill="#64748b">3. 실행 및 즉각적인 결과 출력</text>


  <!-- Right: Interpreter Space (Center X = 590) -->
  <rect x="420" y="100" width="340" height="300" class="box-interpreter" />
  <text x="590" y="132" class="heading" fill="#1d4ed8">인터프리터 방식 (PHP, Python 등)</text>

  <!-- Source -->
  <rect x="490" y="150" width="200" height="40" class="badge-active" />
  <text x="590" y="174" class="heading" font-size="12" fill="#1e40af">1. 고수준 소스 코드 (.php)</text>

  <path d="M 590 190 L 590 220" class="line-active" marker-end="url(#arrow-blue)" />
  <text x="655" y="211" class="arrow-text" fill="#2563eb">요청 시 실시간 해석</text>

  <!-- Engine parsing -->
  <rect x="490" y="225" width="200" height="45" class="badge-amber" />
  <text x="590" y="244" class="heading" font-size="12" fill="#92400e">2. Zend Engine VM (Opcode)</text>
  <text x="590" y="260" class="arrow-text" font-size="10" fill="#d97706">(메모리 상 바이트코드 컴파일 &amp; 가상 실행)</text>

  <path d="M 590 270 L 590 305" class="line-active" marker-end="url(#arrow-blue)" />
  <text x="645" y="293" class="arrow-text" fill="#2563eb">즉시 가상 실행</text>

  <!-- Run -->
  <rect x="490" y="310" width="200" height="40" class="badge-green" />
  <text x="590" y="334" class="heading" font-size="12" fill="#065f46">3. 동적 결과 출력 및 응답</text>

  <!-- Loopback arrow for Interpreter (Code modification loop) -->
  <path d="M 490 330 C 415 330, 415 170, 485 170" class="line-success" marker-end="url(#arrow-green)" />
  
  <g filter="url(#shadow)">
    <rect x="390" y="232" width="90" height="30" fill="#ffffff" stroke="#10b981" stroke-width="1.5" rx="6" />
    <text x="435" y="250" class="arrow-text" fill="#047857" font-weight="bold" font-size="10">코드 수정 즉시 반영</text>
  </g>

</svg>
