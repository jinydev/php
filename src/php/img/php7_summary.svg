<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="auto">
  <style>
    .bg { fill: #fcfdfe; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #64748b; }
    .heading { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
    .heading-left { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #475569; }
    .label-center { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #475569; text-anchor: middle; }
    .code { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #0f172a; }
    .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #1e293b; text-anchor: middle; font-weight: bold; }
    
    .box-php5 { fill: #fafafa; stroke: #94a3b8; stroke-width: 2; rx: 12px; }
    .box-php7 { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 12px; }
    .badge-white { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 6px; }
    .badge-blue { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1; rx: 6px; }

    .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    .line-active { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .line-success { stroke: #10b981; stroke-width: 2.5; fill: none; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="16" />
  <rect x="10" y="10" width="780" height="430" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1" />

  <!-- Title Section -->
  <text x="30" y="45" class="title">PHP 5.x vs PHP 7.x 세대 대변혁 비교</text>
  <text x="30" y="65" class="subtitle">Zend Engine 3 탑재 및 모던 사양 이식으로 맞이한 PHP의 두 번째 전성기</text>

  <!-- Left: PHP 5.6 (Center X = 195) -->
  <rect x="35" y="90" width="310" height="310" class="box-php5" />
  <text x="190" y="125" class="heading" fill="#64748b">과거 세대 (PHP 5.6)</text>
  
  <rect x="50" y="150" width="280" height="50" class="badge-white" />
  <text x="65" y="170" class="heading-left" font-size="12" fill="#475569">Zend Engine 2</text>
  <text x="65" y="188" class="label" font-size="11">속도 처리 한계 및 메모리 과소비</text>

  <rect x="50" y="210" width="280" height="50" class="badge-white" />
  <text x="65" y="230" class="heading-left" font-size="12" fill="#475569">동적 타이핑 전용</text>
  <text x="65" y="248" class="label" font-size="11">매개변수/반환값 타입 제약 불가능</text>

  <rect x="50" y="270" width="280" height="50" class="badge-white" />
  <text x="65" y="290" class="heading-left" font-size="12" fill="#475569">장황한 삼항연산자</text>
  <text x="65" y="308" class="code" font-size="11">isset($a) ? $a : $default</text>

  <rect x="50" y="330" width="280" height="55" class="badge-white" />
  <text x="65" y="350" class="heading-left" font-size="12" fill="#475569">이름 강제 선언 클래스</text>
  <text x="65" y="368" class="label" font-size="11">가벼운 일회성 객체도 별도 선언 필수</text>


  <!-- Middle Transition Indicators -->
  <!-- 2x speedup arrow -->
  <path d="M 355 175 L 435 175" class="line-success" marker-end="url(#arrow-green)" />
  <rect x="350" y="138" width="90" height="25" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="4" />
  <text x="395" y="154" class="arrow-text" fill="#047857">실행 성능 2배↑</text>
  <text x="395" y="195" class="arrow-text" fill="#047857" font-size="10">메모리 50%↓</text>

  <!-- Strict types arrow -->
  <path d="M 355 235 L 435 235" class="line-active" marker-end="url(#arrow-blue)" />
  <text x="395" y="222" class="arrow-text" fill="#1d4ed8" font-size="10">타입 안전성 확보</text>

  <!-- Spaceship/Coalescing arrow -->
  <path d="M 355 295 L 435 295" class="line-active" marker-end="url(#arrow-blue)" />
  <text x="395" y="282" class="arrow-text" fill="#1d4ed8" font-size="10">문법 압축 간소화</text>

  <!-- Anonymous class arrow -->
  <path d="M 355 355 L 435 355" class="line" marker-end="url(#arrow)" />
  <text x="395" y="345" class="arrow-text" fill="#475569" font-size="10">유연성 확장</text>


  <!-- Right: PHP 7.x (Center X = 605) -->
  <rect x="445" y="90" width="310" height="310" class="box-php7" />
  <text x="600" y="125" class="heading" fill="#1d4ed8">모던 세대 (PHP 7.0+)</text>
  
  <rect x="460" y="150" width="280" height="50" class="badge-blue" />
  <text x="475" y="170" class="heading-left" font-size="12" fill="#1e3a8a">Zend Engine 3 (PHPNG)</text>
  <text x="475" y="188" class="label" font-size="11" fill="#2563eb">바이트코드 컴파일 고도화 기법 적용</text>

  <rect x="460" y="210" width="280" height="50" class="badge-blue" />
  <text x="475" y="230" class="heading-left" font-size="12" fill="#1e3a8a">스칼라 &amp; 반환값 타입 힌트</text>
  <text x="475" y="248" class="code" font-size="11" fill="#2563eb">function add(int $a): int</text>

  <rect x="460" y="270" width="280" height="50" class="badge-blue" />
  <text x="475" y="290" class="heading-left" font-size="12" fill="#1e3a8a">Null 병합 (??) / 우주선 (&lt;=&gt;)</text>
  <text x="475" y="308" class="code" font-size="11" fill="#2563eb">$a ?? $default  |  $a &lt;=&gt; $b</text>

  <rect x="460" y="330" width="280" height="55" class="badge-blue" />
  <text x="475" y="350" class="heading-left" font-size="12" fill="#1e3a8a">익명 클래스 (Anonymous Class)</text>
  <text x="475" y="368" class="code" font-size="11" fill="#2563eb">$obj = new class implements Logger</text>

</svg>
